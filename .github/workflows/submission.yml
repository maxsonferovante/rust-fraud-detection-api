name: CI/CD Submission

on:
  pull_request:
    branches:
      - submission
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'submission' && github.event.pull_request.head.ref == 'master'
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Timestamp Tag
        id: vars
        run: echo "tag=$(date +'%d-%m-%Y-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Download Official Rinha Resources
        run: |
          mkdir -p resources
          curl -L https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/mcc_risk.json -o resources/mcc_risk.json
          curl -L https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/normalization.json -o resources/normalization.json
          curl -L https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/references.json.gz -o resources/references.json.gz
          curl -L https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/example-payloads.json -o resources/example-payloads.json
          curl -L https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/example-references.json -o resources/example-references.json

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: maxsonferovante/fraud-detection-api:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare Submission Branch
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch and switch to submission branch
          git fetch origin submission
          git checkout submission

          # Clean submission branch (remove everything)
          git rm -rf .

          # Checkout necessary files from master
          git checkout master -- nginx.conf info.json docker-compose.yml README.md LICENSE

          # Update docker-compose.yml with the new image tag
          sed -i "s|build: .|image: maxsonferovante/fraud-detection-api:${{ steps.vars.outputs.tag }}|g" docker-compose.yml

          # Commit and push back to submission branch
          git add nginx.conf info.json docker-compose.yml README.md LICENSE
          git commit -m "chore: automatic submission update - tag ${{ steps.vars.outputs.tag }}"
          
          # Push using the GITHUB_TOKEN for authentication
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git submission
