services:
  lb:
    build: .
    command: ["./lb"]
    environment:
      - FD_UPSTREAMS=/tmp/sock/api1.sock,/tmp/sock/api2.sock
    volumes:
      - sock-volume:/tmp/sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "30MB"

  api1:
    build: .
    command: ["./fraud-detection-api"]
    environment:
      - RUST_LOG=off
      - N_PROBES=36
      - RINHA_INDEX_PATH=resources/specialist.bin
      - RINHA_SOCK_PATH=/tmp/sock/api1.sock
    volumes:
      - sock-volume:/tmp/sock
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

  api2:
    build: .
    command: ["./fraud-detection-api"]
    environment:
      - RUST_LOG=off
      - N_PROBES=36
      - RINHA_INDEX_PATH=resources/specialist.bin
      - RINHA_SOCK_PATH=/tmp/sock/api2.sock
    volumes:
      - sock-volume:/tmp/sock
    network_mode: none
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "160MB"

volumes:
  sock-volume:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  default:
    driver: bridge
