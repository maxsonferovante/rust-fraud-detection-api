services:
  lb:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

  api1:
    build: .
    environment:
      - RUST_LOG=off
      - N_PROBES=10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    build: .
    environment:
      - RUST_LOG=off
      - N_PROBES=10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

networks:
  default:
    driver: bridge
