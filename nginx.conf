events {
    worker_connections 2048;
}

http {
    access_log off;
    error_log /dev/null crit;

    upstream api {
        server api1:9999;
        server api2:9999;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
